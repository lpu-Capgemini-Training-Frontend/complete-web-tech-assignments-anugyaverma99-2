<!DOCTYPE html>
<html lang="en">
<head>

    <title>Nested List using combinator selector</title>
    <link rel="stylesheet" href="./assignment.css">
</head>
<body>
<section id="biryani">
<h1>Ingredients for Biryani </h1>
<ul>
    <li>Rice</li>
    <li>Chicken</li>
    <ul>
        <li>Fried</li>
        <li>Grilled</li>
        <li>Roasted</li>
    </ul>
</ul>
</section>
<section id="jet">
<h1>Fighter Jet</h1>
<ul>
    <li>Spices</li>
    <li>Gas/Electric</li>
    
</ul>
</section>
<section id="lassi">
<h1>Ingredients for Lassi</h1>
<ul id="list">
    <li>Curd</li>
    <li>Water</li>
    <li>Sugar</li>
    <ul id="nested-list">
        <li>White Sugar</li>
        <li>Brown Sugar</li>
    </ul>
    <li>Malai</li>
    <li>Kova</li>
</ul>
</section>
</body>
